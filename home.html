<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Issue Tracker</title>
  <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
  <!-- Tailwind CSS with DaisyUI CDN -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!-- css file link -->
  <link rel="stylesheet" href="./css/style.css">
  <!-- font cnd link -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap">
  <!-- font awesome cdn link -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body class="bg-base-500">
  <!-- content -->
  <main class="min-h-screen flex flex-col">
    <header class="flex items-center justify-between w-11/12 mx-auto py-3 shrink-0">
      <h1 class="text-2xl font-bold text-center mb-1">GitHub Issue Tracker</h1>
      <label class="flex cursor-pointer gap-2 items-center shrink-0" for="theme-toggle" title="Light / Dark mode">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5" />
          <path
            d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4" />
        </svg>
        <input type="checkbox" id="theme-toggle" class="toggle toggle-primary toggle-lg" />
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
      </label>
    </header>
    <footer class="w-11/12 mx-auto py-3">
      <p class="text-sm text-center text-base-content/60 shrink-0">
        <span class="font-bold">GitHub Issue Tracker</span> © 2026. All rights reserved.
      </p>
    </footer>
  </main>
  <!-- app.js -->
  <script src="./js/them.js"></script>
  <script src="./js/app.js"></script>
</body>

</html>
