<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Issue Tracker</title>
  <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
  <!-- Tailwind CSS with DaisyUI CDN -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!-- css file link -->
  <link rel="stylesheet" href="./css/style.css">
  <!-- font cnd link -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap">
  <!-- font awesome cdn link -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body class="bg-base-500">
  <!-- content -->
  <main class="min-h-screen flex flex-col">
    <header class="shrink-0 w-11/12 mx-auto py-4">
      <!-- Top row: title, search icon, theme, logout -->
      <div class="flex items-center justify-between gap-5">
        <div class="flex items-center gap-2">
          <i class="fa-brands fa-github text-4xl text-base-content"></i>
          <h1 class="text-2xl font-bold">GitHub Issue Tracker</h1>
        </div>
        <div class="flex items-center gap-2">
          <!-- Search panel: header div er niche, toggle -->
          <div class="search-wrapper relative flex items-center gap-2">
            <div id="search-toggle-panel" class="overflow-hidden">
              <input type="text" id="search-input" placeholder="Search issues..."
                class="outline-none input input-bordered w-full min-w-0" aria-label="Search issues" />
            </div>
            <button id="search-btn" type="button" class="btn btn-ghost shrink-0 text-base-content"
              aria-label="Toggle search">
              <i class="fa-solid fa-search"></i>
              <span class="sr-only">Search</span>
            </button>
          </div>
          <label class="flex cursor-pointer gap-2 items-center shrink-0" for="theme-toggle" title="Light / Dark mode">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="5" />
              <path
                d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4" />
            </svg>
            <input type="checkbox" id="theme-toggle" class="toggle toggle-primary toggle-sm" />
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
          </label>
          <a class="btn btn-ghost text-base-content" href="index.html">
            <i class="fa-solid fa-right-from-bracket"></i>
            <span class="sr-only">Logout</span>
          </a>
        </div>
      </div>
    </header>
    <section id="main-section" class="py-16 flex flex-col items-center justify-center bg-base-200">
      <div id="tabs-wrapper"
        class="row-width flex justify-between items-center bg-base-100 border border-base-300 rounded-lg shadow-sm p-6 mb-4">
        <div class="flex gap-2" id="tabs-container">
          <button id="all-tab" class="btn btn-primary btn-outline px-8" data-tab="all">All</button>
          <button id="open-tab" class="btn btn-primary btn-outline px-6" data-tab="open">Open</button>
          <button id="closed-tab" class="btn btn-primary btn-outline px-6" data-tab="closed">Closed</button>
        </div>
        <div class="">
          <button id="add-new-issue" class="btn btn-primary">+ New Issue</button>
        </div>
      </div>
      <div id="issue-count-wrapper"
        class="row-width flex justify-between items-center bg-base-100 border border-base-300 shadow-sm p-6 rounded-t-lg">
        <div class="flex items-center gap-2">
          <img src="./assets/Aperture.png" alt="open-issue" class="w-10 h-10">
          <div>
            <h3 class="text-2xl font-semibold text-base-content gap-2 flex items-center">
              <span id="issue-count-text-unit">0</span>
              <span id="issue-count-text">Issues</span>
            </h3>
            <p class="text-sm text-base-content/70">Track and manage your project issues</p>
          </div>
        </div>
        <div class="flex items-center gap-2">
          <span class="w-3 h-3 rounded-full bg-[#00A96E]"></span>
          <span class="text-base-content/70 font-semibold">Open</span>
          <span class="w-3 h-3 rounded-full bg-[#A855F7]"></span>
          <span class="text-base-content/70 font-semibold">Closed</span>
        </div>
      </div>
      <div id="cards-container"
        class="grid grid-cols-4 gap-4 row-width bg-[#FBFBFB] border border-base-300 border-t-0 p-6 rounded-b-lg shadow-lg">

  

      </div>
    </section>
    <footer class="w-11/12 mx-auto py-3">
      <p class="text-sm text-center text-base-content/60 shrink-0">
        <span class="font-bold">GitHub Issue Tracker</span> © 2026. All rights reserved.
      </p>
    </footer>
  </main>



  <!-- app.js -->
  <script src="./js/them.js"></script>
  <script src="./js/app.js"></script>
</body>

</html>
