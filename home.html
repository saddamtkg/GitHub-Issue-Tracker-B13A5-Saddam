<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Issue Tracker</title>
  <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
  <!-- Tailwind CSS with DaisyUI CDN -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!-- css file link -->
  <link rel="stylesheet" href="./css/style.css">
  <!-- font cnd link -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap">
  <!-- font awesome cdn link -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body class="bg-base-500">
  <!-- content -->
  <main class="min-h-screen flex flex-col">
    <header class="header-with-search shrink-0 w-full max-w-[1240px] mx-auto px-4 sm:px-6 py-3 sm:py-4 relative">
      <!-- Top row: choto screen e center, boro screen e justify-between -->
      <div class="flex flex-wrap items-center justify-center sm:justify-between gap-3 sm:gap-5">
        <div class="flex items-center gap-2 min-w-0">
          <i class="fa-brands fa-github text-2xl sm:text-4xl text-base-content shrink-0"></i>
          <h1 class="text-lg sm:text-2xl font-bold truncate">GitHub Issue Tracker</h1>
        </div>
        <div class="flex items-center gap-1 sm:gap-2 shrink-0">
          <div class="search-wrapper flex items-center gap-2">
            <button id="search-btn" type="button" class="btn btn-ghost shrink-0 text-base-content"
              aria-label="Toggle search">
              <i class="fa-solid fa-search"></i>
              <span class="sr-only">Search</span>
            </button>
          </div>
          <label class="flex cursor-pointer gap-2 items-center shrink-0" for="theme-toggle" title="Light / Dark mode">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="5" />
              <path
                d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4" />
            </svg>
            <input type="checkbox" id="theme-toggle" class="toggle toggle-primary toggle-sm" />
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
          </label>
          <a class="btn btn-ghost text-base-content" href="index.html">
            <i class="fa-solid fa-right-from-bracket"></i>
            <span class="sr-only">Logout</span>
          </a>
        </div>
      </div>
      <!-- Search panel: 800px er niche header er niche full-width expand, 801px+ e inline -->
      <div id="search-toggle-panel" class="search-panel-below">
        <input type="text" id="search-input" placeholder="Search issues..."
          class="outline-none input input-bordered w-full min-w-0" aria-label="Search issues" />
      </div>
    </header>
    <section id="main-section" class="py-6 sm:py-10 md:py-16 flex flex-col items-center justify-center bg-base-200 px-4 sm:px-6">
      <div id="tabs-wrapper"
        class="row-width w-full flex flex-col sm:flex-row sm:justify-between sm:items-center items-center gap-4 bg-base-100 border border-base-300 rounded-lg shadow-sm p-4 sm:p-6 mb-4">
        <div class="flex flex-wrap gap-2 justify-center" id="tabs-container">
          <button id="all-tab" class="btn btn-primary btn-outline px-4 sm:px-8 btn-sm sm:btn-md" data-tab="all">All</button>
          <button id="open-tab" class="btn btn-primary btn-outline px-3 sm:px-6 btn-sm sm:btn-md" data-tab="open">Open</button>
          <button id="closed-tab" class="btn btn-primary btn-outline px-3 sm:px-6 btn-sm sm:btn-md" data-tab="closed">Closed</button>
        </div>
        <div class="w-full sm:w-auto">
          <button id="add-new-issue" class="btn btn-primary btn-sm sm:btn-md w-full sm:w-auto">+ New Issue</button>
        </div>
      </div>
      <div id="issue-count-wrapper"
        class="row-width w-full flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4 bg-base-100 border border-base-300 shadow-sm p-4 sm:p-6 rounded-t-lg">
        <div class="flex items-center gap-2">
          <img src="./assets/Aperture.png" alt="open-issue" class="w-8 h-8 sm:w-10 sm:h-10 shrink-0">
          <div class="min-w-0">
            <h3 class="text-xl sm:text-2xl font-semibold text-base-content gap-2 flex items-center flex-wrap">
              <span id="issue-count-text-unit">0</span>
              <span id="issue-count-text">Issues</span>
            </h3>
            <p class="text-xs sm:text-sm text-base-content/70">Track and manage your project issues</p>
          </div>
        </div>
        <div class="flex items-center gap-2 shrink-0">
          <span class="w-3 h-3 rounded-full bg-[#00A96E]"></span>
          <span class="text-base-content/70 font-semibold text-sm">Open</span>
          <span class="w-3 h-3 rounded-full bg-[#A855F7]"></span>
          <span class="text-base-content/70 font-semibold text-sm">Closed</span>
        </div>
      </div>
      <div id="new-issue-toast" class="row-width w-full hidden mt-2"></div>
      <div id="loading-spinner-wrapper"
        class="loading-spinner-wrapper row-width w-full flex justify-center items-center min-h-[200px] sm:min-h-[280px] bg-base-200 border border-base-300 border-t-0 rounded-b-lg">
        <span class="loading loading-spinner loading-lg text-primary" aria-hidden="true"></span>
        <span class="sr-only">Loading issues...</span>
      </div>
      <div id="cards-container-wrapper" class="row-width w-full hidden">
        <div id="cards-container"
          class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3 sm:gap-4 justify-center row-width w-full bg-base-200 border border-base-300 border-t-0 p-4 sm:p-6 rounded-b-lg shadow-lg">
        </div>
      </div>
      <!-- Load more button - All tab e 8 kore issue load korar jonno -->
      <div id="load-more-wrapper" class="row-width w-full mt-4 text-center hidden">
        <button id="load-more-btn" class="btn btn-primary btn-sm sm:btn-md">Load more</button>
      </div>
    </section>
    <!-- Modal: full content is built in app.js template string (id="modal-issue-content") -->
    <dialog id="issue-modal" class="modal">
      <div class="modal-box w-[95vw] max-w-2xl mx-auto bg-base-100 shadow-lg rounded-lg p-4 sm:p-6 relative max-h-[90vh] overflow-y-auto">
        <div id="modal-issue-content"><!-- filled by app.js template string --></div>
      </div>
      <form method="dialog" class="modal-backdrop">
        <button type="submit">close</button>
      </form>
    </dialog>
    <!-- New Issue modal: form in newIssue.js -->
    <dialog id="new-issue-modal" class="modal">
      <div class="modal-box w-[95vw] max-w-2xl mx-auto bg-base-100 border border-base-300 shadow-lg rounded-lg p-4 sm:p-6 relative max-h-[90vh] overflow-y-auto">
        <form method="dialog" class="absolute right-2 top-2">
          <button type="submit" class="btn btn-sm btn-circle btn-ghost">✕</button>
        </form>
        <h2 class="font-bold text-lg sm:text-xl pr-8 mb-4 text-base-content">New Issue</h2>
        <form id="new-issue-form" class="space-y-4">
          <div class="form-control">
            <label class="label" for="new-issue-title"><span class="label-text font-medium">Title</span></label>
            <input type="text" id="new-issue-title" name="title" placeholder="Issue title"
              class="input input-bordered w-full" required />
          </div>
          <div class="form-control">
            <label class="label" for="new-issue-description"><span
                class="label-text font-medium">Description</span></label>
            <textarea id="new-issue-description" name="description" placeholder="Describe the issue..."
              class="textarea textarea-bordered w-full min-h-24" rows="4"></textarea>
          </div>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div class="form-control">
              <label class="label" for="new-issue-status"><span class="label-text font-medium">Status</span></label>
              <select id="new-issue-status" name="status" class="select select-bordered w-full">
                <option value="open">Open</option>
                <option value="closed">Closed</option>
              </select>
            </div>
            <div class="form-control">
              <label class="label" for="new-issue-priority"><span class="label-text font-medium">Priority</span></label>
              <select id="new-issue-priority" name="priority" class="select select-bordered w-full">
                <option value="high">High</option>
                <option value="medium" selected>Medium</option>
                <option value="low">Low</option>
              </select>
            </div>
          </div>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div class="form-control">
              <label class="label" for="new-issue-author"><span class="label-text font-medium">Author</span></label>
              <input type="text" id="new-issue-author" name="author" placeholder="Your name"
                class="input input-bordered w-full" />
            </div>
            <div class="form-control">
              <label class="label" for="new-issue-assignee"><span class="label-text font-medium">Assignee</span></label>
              <input type="text" id="new-issue-assignee" name="assignee" placeholder="Assignee name"
                class="input input-bordered w-full" />
            </div>
          </div>
          <div class="form-control">
            <label class="label" for="new-issue-labels"><span class="label-text font-medium">Labels</span></label>
            <input type="text" id="new-issue-labels" name="labels"
              placeholder="BUG, HELP WANTED, ENHANCEMENT (comma separated)" class="input input-bordered w-full" />
          </div>
          <div class="flex flex-wrap gap-2 justify-end mt-6">
            <button type="button" class="btn btn-ghost" id="new-issue-cancel">Cancel</button>
            <button type="submit" class="btn btn-primary">Add Issue</button>
          </div>
        </form>
      </div>
      <form method="dialog" class="modal-backdrop">
        <button type="submit">close</button>
      </form>
    </dialog>
    <footer class="w-full max-w-[1240px] mx-auto px-4 sm:px-6 py-3">
      <p class="text-xs sm:text-sm text-center text-base-content/60 shrink-0">
        <span class="font-bold">GitHub Issue Tracker</span> © 2026. All rights reserved.
      </p>
    </footer>
  </main>



  <!-- app.js then newIssue.js (newIssue uses addNewIssueToApp from app.js) -->
  <script src="./js/them.js"></script>
  <script src="./js/app.js"></script>
  <script src="./js/newIssue.js"></script>
</body>

</html>
